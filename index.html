<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>SVNBIRDS | Independent Music Label</title>
  <meta name="description" content="SVNBIRDS is a leading independent music ecosystem for artists in the Middle East & North Africa. Discover new releases and cultural content from a 360 powerhouse in the regional music scene.">

  <meta property="og:title" content="SVNBIRDS">
  <meta property="og:description" content="SVNBIRDS is a leading independent music ecosystem for artists in the Middle East & North Africa.">
  <meta property="og:image" content="media/cover-image.png"> 
  <meta property="og:url" content="https://svnbirds.com">

  <meta name="twitter:site" content="@svnbirds">

  <link rel="icon" href="favicon.png" type="image/png"/>
  <link rel="stylesheet" href="style.css">

  <style>
    /* Styling for the new bio line */
    .hero-content {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
    }
    .main-hero-logo {
      max-width: 300px; /* Adjust based on your existing layout */
      height: auto;
    }
    .hero-bio {
      color: #ffffff;
      font-size: 1.1rem;
      margin-top: 25px;
      max-width: 500px;
      font-weight: 300;
      letter-spacing: 0.05em;
      line-height: 1.5;
      text-transform: uppercase;
      opacity: 0.9;
      text-shadow: 0 2px 10px rgba(0,0,0,0.5);
    }
    @media (max-width: 768px) {
      .hero-bio {
        font-size: 0.9rem;
        padding: 0 20px;
      }
    }
  </style>

  <script async src="https://www.googletagmanager.com/gtag/js?id=G-D9H159KTJ7"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());
    gtag('config', 'G-D9H159KTJ7');

<body>
  <div id="loading-bar"></div>

  <div id="page-content">
    <section class="hero" id="hero">
      <div class="image-container">
        <img src="media/moving-light-streaks-poster.jpg" alt="SVNBIRDS Hero Background" class="hero-bg">
      </div>
      <div class="hero-content">
        <img src="media/cover-image.png" alt="SVNBIRDS Logo" class="main-hero-logo">
        <p class="hero-bio">A Creative Platform for World-Class Talent and Cultural Innovation.</p>
      </div>
    </section>

    <h2 class="section-title">Releases</h2>
    <div class="releases-container">
      <div class="scroll-container" id="releases"></div>
    </div>

    <h2 class="section-title">Artists</h2>
    <div class="artist-grid" id="artist-grid"></div>

    <h2 class="section-title">Shop</h2>
    <div class="shop-grid" id="shop">
      <div id='collection-component-1758190269461'></div>
    </div>

    <h2 class="section-title">Press</h2>
    <div class="press-container">
      <div class="press-grid" id="press-grid"></div>
    </div>

    <h2 class="section-title">Clients</h2>
    <div class="clients-section">
      <img src="media/clients2.png" alt="Clients and Partners" class="clients-image">
    </div>

    <footer>
      <div class="footer-content">
        <div class="footer-section contact">
          <h3>Contact Us</h3>
          <p>For booking and general inquiries:</p>
          <p><a href="mailto:booking@svnbirds.com">booking@svnbirds.com</a></p>
          <a href="https://www.instagram.com/svnbirdspro/" target="_blank" aria-label="Instagram">
            <img src="/media/icons/instagram-icon.svg" alt="Instagram Icon" style="width:24px;height:24px;">
          </a>
        </div>
      </div>
      <div class="footer-bottom">
        <p>© <span id="current-year"></span> SVNBIRDS. All Rights Reserved.</p>
      </div>
    </footer>
  </div>

  <button id="player-toggle" class="player-toggle" style="left:10px;">▼</button>
  <iframe src="/player.html" id="player-frame" scrolling="no"></iframe>

  <script src="shopify.js"></script>
  <script src="script.js"></script>

</body>
</html>
